    document.getElementById("migrate-btn").addEventListener("click", async (e) => {
      e.target.disabled = true;
      const statusText = document.getElementById("status");
      statusText.style.color = "#2980b9";
      statusText.textContent = "Uploading 50 verified articles with media... please wait.";

      let successCount = 0;

      for (const article of latestArticles) {
        try {
          await addDoc(collection(db, "articles"), article);
          successCount++;
          statusText.textContent = `Uploaded ${successCount} out of 50...`;
        } catch (error) {
          console.error("Error uploading article:", error);
          statusText.style.color = "#e74c3c";
          statusText.textContent = `Error at article ${successCount + 1}. Check console.`;
          return; 
        }
      }

      statusText.style.color = "#27ae60";
      statusText.textContent = "✅ All 50 latest news articles (with images & video links) have been successfully added!";
    });
  </script>
</body>
</html>
