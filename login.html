<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login - 20NEWS VISNAGAR</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="main-header">
    <div class="logo">
      <img src="logo.png" alt="Logo" class="logo"/>
      <h1>20NEWS VISNAGAR</h1>
    </div>
  </header>

  <main class="section">
    <div class="login-card" style="max-width: 420px; margin: 1.5rem auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 1.5rem; box-shadow: 0 3px 8px rgba(0,0,0,0.06);">
      <h2 style="margin-top: 0; border-left: 4px solid #3498db; padding-left: 0.5rem;">Login to Admin</h2>
      
      <form id="login-form">
        <label style="display: block; margin-top: 1rem; font-weight: bold;">Username</label>
        <input id="username" type="text" required style="width: 100%; padding: 0.6rem; margin-top: 0.3rem; border: 1px solid #ccc; border-radius: 8px;">
        
        <label style="display: block; margin-top: 1rem; font-weight: bold;">Password</label>
        <input id="password" type="password" required style="width: 100%; padding: 0.6rem; margin-top: 0.3rem; border: 1px solid #ccc; border-radius: 8px;">
        
        <button type="submit" style="width: 100%; padding: 0.8rem; background: #3498db; color: #fff; border: 0; border-radius: 8px; margin-top: 1.2rem; font-weight: bold; cursor: pointer;">Login</button>
      </form>
      
      <p id="login-error" style="color: #e11d2e; margin-top: 1rem; font-weight: bold; text-align: center;"></p>
    </div>
  </main>

  <footer>
    <p>&copy; 20NEWS VISNAGAR. All rights reserved.</p>
  </footer>
  
  <script src="login.js"></script>
</body>
</html>
